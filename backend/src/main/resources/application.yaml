spring:
  # Load the shared root .env (one level up from backend/) as the source for ${...} placeholders below.
  # Path is relative to the working directory the app is started from (backend/ per ./mvnw spring-boot:run).
  # "optional:" means startup won't fail if the file is absent (e.g. in production where real env vars are injected).
  config:
    import: optional:file:../.env[.properties]

  application:
    name: karunfruits

  datasource:
    url: jdbc:postgresql://ep-sparkling-mountain-aojg1390-pooler.c-2.ap-southeast-1.aws.neon.tech/neondb
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  jackson:
    serialization:
      fail-on-empty-beans: false
    default-property-inclusion: non_null

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:KarunFruitsSecretKeyForJWTTokenGenerationAndValidation2024VeryLongSecret}
  expiration: 86400000

razorpay:
  key:
    id: ${RAZORPAY_KEY_ID}
    secret: ${RAZORPAY_KEY_SECRET}

twilio:
  account-sid: ${TWILIO_ACCOUNT_SID}
  auth-token: ${TWILIO_AUTH_TOKEN}
  phone-number: ${TWILIO_PHONE_NUMBER}

shiprocket:
  email: ${SHIPROCKET_EMAIL}
  password: ${SHIPROCKET_PASSWORD}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  google:
    client-id: ${GOOGLE_CLIENT_ID}

logging:
  level:
    com.karunfruits: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
